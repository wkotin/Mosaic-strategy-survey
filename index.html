async function fetchResponses(){
  var r=await fetch(SUPABASE_URL+"/rest/v1/responses?select=*&order=submitted_at.asc",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
  if(!r.ok) throw new Error("Failed to fetch: "+r.status);
  return r.json();
}
function avg(all,key){
  var vals=all.map(function(r){return r.answers[key];}).filter(function(v){return v>0&&!isNaN(v);});
  return vals.length?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):"—";
}
function isErr(k){ return state.errors.indexOf(k)>=0; }

// Per-section required keys
function getSectionRequired(s){
  var req=[];
  if(s===0){ req.push("name","mission_combined"); }
  if(s===1){ CUSTOMERS.forEach(function(_,i){req.push("c18_"+i,"c30_"+i);}); }
  if(s===2){ MODULES_ES.forEach(function(_,i){req.push("mod_es_"+i);}); CONF_ITEMS.forEach(function(_,i){req.push("conf_"+i);}); }
  if(s===3){ EXPANSION_ITEMS.forEach(function(_,i){req.push("exp_"+i);}); }
  if(s===4){ VERT_IDEAS.forEach(function(_,i){req.push("vert_attr_"+i,"vert_diff_"+i);}); HORIZ_IDEAS.forEach(function(_,i){req.push("horiz_attr_"+i,"horiz_diff_"+i);}); req.push("capacity"); }
  if(s===5){ req.push("comp_competitors","florida_question"); req.push("cadv_rank_imp"); COMP_ADVS.forEach(function(_,i){req.push("cadv_perf_"+i);}); }
  return req;
}
function getMissingForSection(s){
  return getSectionRequired(s).filter(function(k){
    var v=state.answers[k];
    if(v===undefined||v===""||v===null) return true;
    if(k==="capacity"&&typeof v==="number"&&v<0) return true;
    return false;
  });
}

function friendlyLabel(k){
  if(k==="name") return "Your name";
  if(k==="mission_combined") return "Mosaic mission";
  if(k==="comp_competitors") return "Largest competitors";
  if(k==="florida_question") return "Florida question";
  if(k==="capacity") return "Capacity for new ideas";
  var m;
  m=k.match(/^c18_(\d+)$/); if(m) return "12-month: "+CUSTOMERS[+m[1]];
  m=k.match(/^c30_(\d+)$/); if(m) return "2030: "+CUSTOMERS[+m[1]];
  m=k.match(/^mod_es_(\d+)$/);   if(m) return "End-state: "+MODULES_ES[+m[1]];
  m=k.match(/^conf_(\d+)$/);     if(m) return "Confidence: "+CONF_ITEMS[+m[1]];
  m=k.match(/^exp_(\d+)$/);      if(m) return "Expansion statement "+(+m[1]+1);
  m=k.match(/^vert_attr_(\d+)$/); if(m) return "Attractiveness: "+VERT_IDEAS[+m[1]].name;
  m=k.match(/^vert_diff_(\d+)$/); if(m) return "Build difficulty: "+VERT_IDEAS[+m[1]].name;
  m=k.match(/^horiz_attr_(\d+)$/); if(m) return "Attractiveness: "+HORIZ_IDEAS[+m[1]].name;
  m=k.match(/^horiz_diff_(\d+)$/); if(m) return "Build difficulty: "+HORIZ_IDEAS[+m[1]].name;
  m=k.match(/^cadv_rank_imp$/);  if(m) return "Importance ranking (Section 6)";
  m=k.match(/^cadv_perf_(\d+)$/); if(m) return "Performance: "+COMP_ADVS[+m[1]].name+" (Section 6)";
  return k;
}

function rBtns(key,labels){
  return labels.map(function(lbl,j){
    var val=j+1;
    var cur=g(key,0);
    var sel=cur===val?" sel":"";
    var err=isErr(key)&&!sel?" field-error":"";
    return '<button type="button" class="rBtn'+sel+err+'" onclick="setR(\''+key+'\','+val+')">'+lbl+'</button>';
  }).join("");
}
function ta(key,ph,optional){
  ph=ph||"Your response...";
  var errCls=(!optional&&isErr(key))?" field-error":"";
  return '<textarea class="'+errCls+'" placeholder="'+ph+'" oninput="sv(\''+key+'\',this.value)">'+g(key)+'</textarea>';
}

function renderSurvey(){
  var fns=[section0,section1,section2,section3,section4,section5];
  var isLast=state.section===SECTIONS.length-1;
  var steps=SECTIONS.map(function(_,i){ var cls=i<state.section?"done":(i===state.section?"active":""); return '<div class="progress-step '+cls+'"></div>'; }).join("");
  var valBanner="";
  if(state.errors.length){
    var items=state.errors.slice(0,8).map(function(k){return '<li>'+friendlyLabel(k)+'</li>';}).join("");
    var more=state.errors.length>8?'<li>...and '+(state.errors.length-8)+' more</li>':"";
    valBanner='<div class="val-banner">Please complete the following before submitting:<ul>'+items+more+'</ul></div>';
  }
  var nextBtn=isLast
    ?'<button type="button" class="btn primary" onclick="submitSurvey()" '+(state.submitting?"disabled":"")+'>'+( state.submitting?'<span class="spinner"></span> Submitting...':'Submit survey')+'</button>'
    :'<button type="button" class="btn primary" onclick="nextSection()">Next →</button>';
  return '<div class="progress-wrap"><div class="progress-steps">'+steps+'</div>'
    +'<div class="progress-label">Section '+(state.section+1)+' of '+SECTIONS.length+' — <strong>'+SECTIONS[state.section]+'</strong></div></div>'
    +valBanner+fns[state.section]()
    +'<div class="nav-row"><button type="button" class="btn" onclick="prevSection()" '+(state.section===0?"disabled":"")+'>← Back</button>'+nextBtn+'</div>';
}

/* ── Dashboard ── */

function labelFor(key, val){
  var m;
  m=key.match(/^c18_|^c30_/); if(m) return CUST_LABELS[val-1]||val;
  m=key.match(/^mod_es_/); if(m) return END_STATE_LABELS[val-1]||val;
  m=key.match(/^conf_/); if(m) return CONF_LABELS[val-1]||val;
  m=key.match(/^exp_\d+$/); if(m) return AGREE_LABELS[val-1]||val;
  m=key.match(/^exp_str_/); if(m) return END_STATE_LABELS[val-1]||val;
  m=key.match(/^vert_attr_|^horiz_attr_/); if(m) return ATTRACT_LABELS[val-1]||val;
  m=key.match(/^vert_diff_|^horiz_diff_/); if(m) return DIFF_LABELS[val-1]||val;
  m=key.match(/^cadv_imp_/); if(m) return IMP_LABELS[val-1]||val;
  m=key.match(/^cadv_perf_/); if(m) return PERF_LABELS[val-1]||val;
  if(key==="capacity") return CAPACITY_LABELS[val]||val;
  return val;
}

function renderRespondentView(all, names){
  var idx=state.selectedRespondent;
  if(idx>=all.length) idx=0;
  var r=all[idx];
  var a=r.answers;

  function row(label, key){
    var v=a[key];
    if(v===undefined||v===""||v===null) return '<div class="resp-detail-row"><span class="resp-detail-label">'+label+'</span><span class="resp-detail-val" style="color:var(--text-light)">—</span></div>';
    var display=(typeof v==="number")?('<span class="pill">'+labelFor(key,v)+'</span>'):v;
    return '<div class="resp-detail-row"><span class="resp-detail-label">'+label+'</span><span class="resp-detail-val">'+display+'</span></div>';
  }

  var selector='<div class="resp-select-row">'
    +'<label style="font-size:13px;color:var(--text-secondary);font-weight:500">Viewing:</label>'
    +'<select onchange="setRespondent(this.value)">'+names.map(function(n,i){ return '<option value="'+i+'"'+(i===idx?' selected':'')+'>'+n+'</option>'; }).join("")+'</select>'
    +'<span style="font-size:12px;color:var(--text-light)">Submitted '+new Date(r.submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+'</span>'
    +'</div>';

  var mission='<div class="resp-detail-section"><h4>Mission</h4>'+row("Mission statement","mission_combined")+'</div>';

  var custRows12=CUSTOMERS.map(function(c,i){ return row(c,"c18_"+i); }).join("");
  var custRows30=CUSTOMERS.map(function(c,i){ return row(c,"c30_"+i); }).join("");
  var customers='<div class="resp-detail-section"><h4>Customers — within 12 months</h4>'+custRows12+'</div>'
    +'<div class="resp-detail-section"><h4>Customers — by 2030</h4>'+custRows30+'</div>';

  var modRows=MODULES_ES.map(function(m,i){ return row(m,"mod_es_"+i); }).join("");
  var confRows=CONF_ITEMS.map(function(c,i){ return row(c,"conf_"+i); }).join("");
  var platform='<div class="resp-detail-section"><h4>Core Platform End-States</h4>'+modRows+'</div>'
    +'<div class="resp-detail-section"><h4>Delivery Confidence</h4>'+confRows+'</div>';

  var expRows=EXPANSION_ITEMS.map(function(item,i){
    var v=a["exp_"+i];
    var str=a["exp_str_"+i];
    var display=v?(AGREE_LABELS[v-1]||v):"—";
    if(str&&(v===4||v===5)) display+=' → Strength needed: '+END_STATE_LABELS[str-1];
    return '<div class="resp-detail-row"><span class="resp-detail-label" style="font-size:12px">'+item+'</span><span class="resp-detail-val"><span class="pill">'+display+'</span></span></div>';
  }).join("");
  var expansion='<div class="resp-detail-section"><h4>Expansion Strategy</h4>'+expRows+'</div>';

  var vertRows=VERT_IDEAS.map(function(idea,i){
    var attr=a["vert_attr_"+i]; var diff=a["vert_diff_"+i];
    var attrTxt=attr?(ATTRACT_LABELS[attr-1]||attr):"—";
    var diffTxt=diff?(DIFF_LABELS[diff-1]||diff):"—";
    return '<div class="resp-detail-row"><span class="resp-detail-label">'+idea.icon+' '+idea.name+'</span>'
      +'<span class="resp-detail-val" style="font-size:12px">Attractiveness: <strong>'+attrTxt+'</strong> &nbsp; Difficulty: <strong>'+diffTxt+'</strong></span></div>';
  }).join("");
  var horizRows=HORIZ_IDEAS.map(function(idea,i){
    var attr=a["horiz_attr_"+i]; var diff=a["horiz_diff_"+i];
    var attrTxt=attr?(ATTRACT_LABELS[attr-1]||attr):"—";
    var diffTxt=diff?(DIFF_LABELS[diff-1]||diff):"—";
    return '<div class="resp-detail-row"><span class="resp-detail-label">'+idea.icon+' '+idea.name+'</span>'
      +'<span class="resp-detail-val" style="font-size:12px">Attractiveness: <strong>'+attrTxt+'</strong> &nbsp; Difficulty: <strong>'+diffTxt+'</strong></span></div>';
  }).join("");
  var extras=(a._extra_ideas&&a._extra_ideas.length)?a._extra_ideas.map(function(idea){ return '<div class="resp-detail-row"><span class="resp-detail-label">'+( idea.desc||"(no description)")+'</span><span class="resp-detail-val" style="font-size:12px">'+(idea.attr?'Attractiveness: '+(ATTRACT_LABELS[idea.attr-1]||idea.attr)+' &nbsp; ':'')+(idea.diff?'Difficulty: '+(DIFF_LABELS[idea.diff-1]||idea.diff):'')+'</span></div>'; }).join(""):"<div class='no-resp'>None added</div>";
  var capVal=a["capacity"];
  var capTxt=capVal!==undefined?CAPACITY_LABELS[capVal]:"—";
  var products='<div class="resp-detail-section"><h4>Vertical Ideas</h4>'+vertRows+'</div>'
    +'<div class="resp-detail-section"><h4>Horizontal Ideas</h4>'+horizRows+'</div>'
    +'<div class="resp-detail-section"><h4>User-submitted ideas</h4>'+extras+'</div>'
    +'<div class="resp-detail-section"><h4>Capacity</h4><div class="resp-detail-row"><span class="resp-detail-label">New ideas in next 12 months</span><span class="resp-detail-val"><span class="pill">'+capTxt+'</span></span></div></div>';

  var impRank=a["cadv_rank_imp"]||COMP_ADVS.map(function(_,i){return i;});
  var impRows=impRank.map(function(idx,pos){ return '<div class="resp-detail-row"><span class="resp-detail-label">#'+(pos+1)+' — '+COMP_ADVS[idx].name+'</span></div>'; }).join("");
  var perfRows=COMP_ADVS.map(function(adv,i){ var perf=a["cadv_perf_"+i]; var perfTxt=perf?(PERF_LABELS[perf-1]||perf):"—"; return '<div class="resp-detail-row"><span class="resp-detail-label">'+adv.name+'</span><span class="resp-detail-val"><span class="pill">'+perfTxt+'</span></span></div>'; }).join("");
  var competitive='<div class="resp-detail-section"><h4>Competitors</h4>'+row("Who are our largest competitors?","comp_competitors")+'</div>'
    +'<div class="resp-detail-section"><h4>Importance ranking</h4>'+impRows+'</div>'
    +'<div class="resp-detail-section"><h4>Performance ratings</h4>'+perfRows+'</div>';

  var florida='<div class="resp-detail-section"><h4>Florida Question</h4>'+row("What not to leave Florida without discussing","florida_question")+'</div>';

  return '<div class="dash-card">'+selector+mission+customers+platform+expansion+products+competitive+florida+'</div>';
}

function renderSummaryView(all, names){
  function openText(key,label){
    var entries=all.map(function(r,i){ return r.answers[key]?'<div class="resp-item"><strong>'+names[i]+':</strong> '+r.answers[key]+'</div>':""; }).join("");
    return '<div class="dash-card"><h3>'+label+'</h3>'+(entries||"<div class='no-resp'>No responses yet</div>")+'</div>';
  }
  function barChart(title,items,keyFn,maxScale){
    maxScale=maxScale||6;
    return '<div class="dash-card"><h3>'+title+'</h3>'+items.map(function(item,i){
      var a=avg(all,keyFn(i));
      return '<div class="bar-row"><span class="bar-label">'+item+'</span><span class="bar-val">'+a+'</span>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+(a==="—"?0:Math.round(parseFloat(a)/maxScale*100))+'%"></div></div></div>';
    }).join("")+'</div>';
  }
  var extraIdeasHtml='<div class="dash-card"><h3>User-submitted ideas</h3>'
    +(all.map(function(r,i){ var ideas=r.answers._extra_ideas; if(!ideas||!ideas.length) return ""; return ideas.map(function(idea){ if(!idea.desc) return ""; return '<div class="resp-item"><strong>'+names[i]+':</strong> '+idea.desc+(idea.attr?' — Attractiveness: '+(ATTRACT_LABELS[idea.attr-1]||idea.attr):'')+(idea.diff?' — Difficulty: '+(DIFF_LABELS[idea.diff-1]||idea.diff):'')+'</div>'; }).join(""); }).join("")||"<div class='no-resp'>None submitted</div>")
    +'</div>';

  return openText("mission_combined","Mission statements")
    +barChart("Customer importance — within 12 months (avg)",CUSTOMERS,function(i){return"c18_"+i;},5)
    +barChart("Customer importance — by 2030 (avg)",CUSTOMERS,function(i){return"c30_"+i;},5)
    +openText("cust_other_12","Other customers — next 12 months")
    +openText("cust_other_30","Other customers — by 2030")
    +barChart("Module end-state target (avg, 1–4)",MODULES_ES,function(i){return"mod_es_"+i;},4)
    +barChart("Delivery confidence (avg, 1–5)",CONF_ITEMS,function(i){return"conf_"+i;},5)
    +barChart("Expansion strategy — agreement (avg, 1–5)",["Early imaging lifecycle","Downstream imaging lifecycle","Horizontal / cross-specialty","Medicine 3.0"],function(i){return"exp_"+i;},5)
    +barChart("Vertical ideas — attractiveness (avg)",VERT_IDEAS.map(function(x){return x.icon+" "+x.name;}),function(i){return"vert_attr_"+i;},6)
    +barChart("Vertical ideas — build difficulty (avg)",VERT_IDEAS.map(function(x){return x.icon+" "+x.name;}),function(i){return"vert_diff_"+i;},6)
    +barChart("Horizontal ideas — attractiveness (avg)",HORIZ_IDEAS.map(function(x){return x.icon+" "+x.name;}),function(i){return"horiz_attr_"+i;},6)
    +barChart("Horizontal ideas — build difficulty (avg)",HORIZ_IDEAS.map(function(x){return x.icon+" "+x.name;}),function(i){return"horiz_diff_"+i;},6)
    +extraIdeasHtml
    +(function(){
      function rankChart(title, storeKey){
        var scores=COMP_ADVS.map(function(){return [];});
        all.forEach(function(r){ var order=r.answers[storeKey]; if(!order||!order.length) return; order.forEach(function(idx,pos){ if(scores[idx]) scores[idx].push(pos+1); }); });
        var rows=COMP_ADVS.map(function(adv,i){
          var arr=scores[i]; var a=arr.length?(arr.reduce(function(a,b){return a+b;},0)/arr.length).toFixed(1):"—";
          return '<div class="bar-row"><span class="bar-label">'+adv.name+'</span><span class="bar-val">'+(a==="—"?"—":"#"+a)+'</span>'
            +'<div class="bar-track"><div class="bar-fill" style="width:'+(a==="—"?0:Math.round((COMP_ADVS.length-parseFloat(a)+1)/COMP_ADVS.length*100))+'%"></div></div></div>';
        }).join("");
        return '<div class="dash-card"><h3>'+title+'</h3><div class="q-sub" style="margin-bottom:8px;font-size:11px">Average rank position — lower number = ranked more important. Bar = relative priority.</div>'+rows+'</div>';
      }
      return rankChart("Competitive advantage — importance ranking (avg position)", "cadv_rank_imp")
           + barChart("Competitive advantage — current performance (avg)",COMP_ADVS.map(function(x){return x.name;}),function(i){return"cadv_perf_"+i;},5);
    })()
    +openText("comp_other","Other competitive advantages")
    +openText("florida_question","What not to leave Florida without discussing");
}

function renderDashboard(){
  if(state.resultsLoading) return '<div class="loading"><span class="spinner"></span>Loading responses...</div>';
  var all=state.resultsData||[];
  if(!all.length) return '<div class="no-resp" style="padding:2rem;text-align:center">No responses submitted yet.</div>';
  var latest=new Date(all[all.length-1].submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  var names=all.map(function(r,i){ return r.answers.name||"Respondent "+(i+1); });

  var viewTabs='<div class="dash-view-tabs">'
    +'<button class="dash-view-tab'+(state.dashView==="summary"?" active":"")+'" onclick="setDashView(\'summary\')">Summary</button>'
    +'<button class="dash-view-tab'+(state.dashView==="respondent"?" active":"")+'" onclick="setDashView(\'respondent\')">By respondent</button>'
    +'</div>';

  var statsRow='<div class="stat-row">'
    +'<div class="stat"><div class="stat-val">'+all.length+'</div><div class="stat-lbl">Total responses</div></div>'
    +'<div class="stat"><div class="stat-val">'+latest+'</div><div class="stat-lbl">Latest submission</div></div>'
    +'</div>';

  var content=state.dashView==="respondent"
    ?renderRespondentView(all,names)
    :renderSummaryView(all,names);

  return statsRow+viewTabs+content
    +'<div style="margin-top:1.5rem;text-align:center"><button class="btn" onclick="loadResults()">↻ Refresh results</button></div>';
}

function render(){
  var app=document.getElementById("app");
  if(state.view==="gate"){
    app.innerHTML='<div class="gate"><div class="gate-card">'
      +'<div class="gate-logo">Mosaic</div><h1>Strategy Workshop</h1><p>Enter the password to continue</p>'
      +'<input type="password" id="pw" placeholder="Password" onkeydown="if(event.key===\'Enter\')checkPw()">'
      +'<div class="err" id="pw-err"></div>'
      +'<button class="btn primary" onclick="checkPw()" style="width:100%">Continue →</button>'
      +'</div></div>';
    return;
  }
  if(state.view==="done"){
    app.innerHTML='<div class="submitted"><div class="check">✅</div><h2>Thank you!</h2><p>Your responses have been recorded.</p></div>';
    return;
  }
  app.innerHTML='<div class="survey-header">'
    +'<div class="header-logo">Mosaic · Strategy Workshop 2025</div>'
    +'<div class="tabs">'
    +'<button class="tab'+(state.tab==="survey"?" active":"")+'" onclick="switchTab(\'survey\')">Survey</button>'
    +'<button class="tab'+(state.tab==="results"?" active":"")+'" onclick="switchTab(\'results\')">Results</button>'
    +'</div></div>'
    +(state.tab==="survey"?renderSurvey():'<div>'+renderDashboard()+'</div>');
}

window.sv=sv;
window.setR=function(k,v){ state.answers[k]=v; state.errors=state.errors.filter(function(e){return e!==k;}); render(); };
window.setCap=function(v){ state.answers["capacity"]=v; state.errors=state.errors.filter(function(e){return e!=="capacity";}); render(); };
window.addExtraIdea=function(){ state.extraIdeas.push({desc:"",attr:0,diff:0}); render(); };
window.removeExtraIdea=function(idx){ state.extraIdeas.splice(idx,1); render(); };
window.updateExtra=function(idx,field,val){ state.extraIdeas[idx][field]=val; };
window.updateExtraR=function(idx,field,val){ state.extraIdeas[idx][field]=val; render(); };
window.setDashView=function(v){ state.dashView=v; render(); };
window.setRespondent=function(i){ state.selectedRespondent=+i; render(); };
window.prevSection=function(){ state.section=Math.max(0,state.section-1); state.errors=[]; render(); window.scrollTo(0,0); };
window.nextSection=function(){
  state.errors=[]; state.section=Math.min(SECTIONS.length-1,state.section+1); render(); window.scrollTo(0,0);
};
window.submitSurvey=async function(){
  var allRequired=[];
  for(var s=0;s<SECTIONS.length;s++){ allRequired=allRequired.concat(getSectionRequired(s)); }
  var missing=allRequired.filter(function(k){ var v=state.answers[k]; if(v===undefined||v===""||v===null) return true; if(k==="capacity"&&typeof v==="number"&&v<0) return true; return false; });
  if(missing.length){ state.errors=missing; render(); window.scrollTo(0,0); return; }
  state.submitting=true; render();
  try{ await saveToSupabase(); state.view="done"; render(); }
  catch(e){ state.submitting=false; alert("Error submitting. Please try again.\n\n"+e.message); render(); }
};
window.loadResults=async function(){
  state.resultsLoading=true; render();
  try{ state.resultsData=await fetchResponses(); }
  catch(e){ alert("Could not load results: "+e.message); }
  state.resultsLoading=false; render();
};
window.switchTab=function(t){
  if(t==="results"&&!state.resultsAuthed){
    var pw=prompt("Enter the admin password to view results:");
    if(pw===RESULTS_PASS){ state.resultsAuthed=true; state.tab=t; loadResults(); }
    else if(pw!==null){ alert("Incorrect admin password."); }
    return;
  }
  state.tab=t;
  if(t==="results"&&!state.resultsData) loadResults();
  else render();
};
window.checkPw=function(){
  var v=document.getElementById("pw").value;
  if(v===SURVEY_PASS){ state.view="survey"; render(); }
  else if(v===RESULTS_PASS){ state.view="survey"; state.resultsAuthed=true; state.tab="results"; render(); loadResults(); }
  else{ document.getElementById("pw-err").textContent="Incorrect password. Please try again."; }
};

// Tap-to-swap ranking (mobile + desktop compatible)
window.rankTap=function(storeKey, pos){
  var order=state.answers[storeKey]?state.answers[storeKey].slice():COMP_ADVS.map(function(_,i){return i;});
  if(!state._rankSelected || state._rankSelected.store !== storeKey){
    state._rankSelected={store:storeKey,pos:pos};
    render(); return;
  }
  var fromPos=state._rankSelected.pos;
  state._rankSelected=null;
  if(fromPos===pos){ render(); return; }
  var tmp=order[fromPos]; order[fromPos]=order[pos]; order[pos]=tmp;
  state.answers[storeKey]=order;
  state.errors=state.errors.filter(function(e){return e!==storeKey;});
  render();
};

render();
</script>
</body>
</html>
