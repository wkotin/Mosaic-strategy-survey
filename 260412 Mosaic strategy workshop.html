<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic Strategy Workshop Survey</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #e6f1fb;
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-info: #185fa5;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.2);
    --accent: #378ADD;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-info: #0c2d4a;
      --text: #f0ede8;
      --text-secondary: #9a9a94;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.2);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
  .app { max-width: 800px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .gate { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; text-align: center; }
  .gate-logo { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 0.5rem; }
  .gate h1 { font-size: 26px; font-weight: 500; }
  .gate p { color: var(--text-secondary); font-size: 14px; }
  .gate input[type=password], .gate input[type=text] { width: 260px; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); margin-top: 0.5rem; display: block; }
  .gate input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .err { font-size: 13px; color: #c0392b; min-height: 18px; }
  .btn { display: inline-block; padding: 9px 26px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; font-size: 14px; font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
  .header-logo { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-secondary); }
  .tabs { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .tab { padding: 6px 18px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text-secondary); font-family: inherit; transition: background 0.15s; }
  .tab.active { background: var(--bg-secondary); color: var(--text); font-weight: 500; }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 0.5rem; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
  .progress-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 2rem; }

  .section-title { font-size: 20px; font-weight: 500; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .question { margin-bottom: 1.5rem; }
  .q-label { font-size: 15px; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
  .q-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; margin-top: 4px; }
  textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.5; }
  textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }

  .rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .rating-label { font-size: 13px; color: var(--text-secondary); flex: 1; min-width: 180px; }
  .stars { display: flex; gap: 4px; }
  .star { width: 30px; height: 30px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); cursor: pointer; font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: background 0.1s; user-select: none; }
  .star:hover { background: var(--bg-secondary); }
  .star.sel { background: var(--bg-info); color: var(--text-info); border-color: var(--accent); font-weight: 500; }

  .module-card { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .module-card-title { font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }

  .submitted { text-align: center; padding: 4rem 1rem; }
  .submitted h2 { font-size: 24px; font-weight: 500; margin-bottom: 0.5rem; }
  .submitted p { color: var(--text-secondary); }

  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stat { background: var(--bg-secondary); border-radius: var(--radius); padding: 0.75rem 1rem; flex: 1; min-width: 100px; }
  .stat-val { font-size: 26px; font-weight: 500; }
  .stat-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .dash-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .dash-card h3 { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; }
  .resp-item { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .resp-item:last-child { border-bottom: none; }
  .resp-item strong { color: var(--text); }
  .bar-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .bar-row:last-child { border-bottom: none; }
  .bar-label { flex: 1; color: var(--text-secondary); }
  .bar-val { font-weight: 500; width: 28px; text-align: right; color: var(--text); }
  .bar-track { width: 80px; height: 5px; background: var(--border); border-radius: 3px; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .no-resp { color: var(--text-secondary); font-size: 13px; font-style: italic; padding: 0.5rem 0; }
  .loading { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 14px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .name-fields { display: flex; gap: 8px; flex-wrap: wrap; }
  .name-fields input { flex: 1; min-width: 120px; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
  .name-fields input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); }
  @media (max-width: 600px) {
    .rating-row { flex-direction: column; align-items: flex-start; }
    .rating-label { min-width: unset; }
  }
</style>
</head>
<body>
<div class="app" id="app"><div class="gate"><div><div class="gate-logo">MOSAIC</div><h1>Strategy Workshop Survey</h1><p style="margin-top:0.5rem">Enter the password to continue</p></div><input type="password" id="pw" placeholder="Password" onkeydown="if(event.key===&#39;Enter&#39;)checkPw()"><div class="err" id="pw-err"></div><button class="btn primary" onclick="checkPw()">Continue</button></div></div>
<script>
const SUPABASE_URL = "https://rrqhatvuxhrwfsccdnbb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJycWhhdHZ1eGhyd2ZzY2NkbmJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjQwMTMsImV4cCI6MjA5MTYwMDAxM30.ILato9OdZf7qbESHBiXQXtoKeZ12c2YUoUw62BzCNIU";
const SURVEY_PASS = "mosaic2025";
const RESULTS_PASS = "mosaicadmin2025";

const CUSTOMERS = ["US radiology practices","International radiology practices","OICs","Hospitals","Payers","Pharma","Medtech","Veterinary","Dental"];
const MODULES = ["Cloud Native Archive / Streaming","Worklist","InfoHub (Patient Jacket)","Capture","Results Center","Drafting","Viewer","Ambient reporting"];
const VERT_IDEAS = ["Imaging order prior authorization","Order-to-acquisition optimization","Acquisition optimization","Peer learning platform","Opportunistic screening","Radiology follow up","Mosaic analytics","Radiology billing"];
const HORIZ_IDEAS = ["Enterprise PACS","Acute care coordination","Patient management","Exam lifecycle visibility (Pizza Tracker)","ED app (escalation feature)","Ordering physician chat","Prioritization portal","Pre-authorization for imaging (Payers)","Drugs (Pharma) + Medical Devices (MedTech)","Dental x-ray drafting","Dog + Cat x-ray drafting"];
const COMP_ADVS = ["Regulatory (drafting clearances)","Distribution (install base)","Proprietary data","Enterprise reliability","Deep clinical integration","Superior execution","RPCS flywheel"];
const SECTIONS = ["Mission","Customers & Products","Core Reading Platform","Product Ideas","Competitive Advantage"];

let state = { view:"gate", section:0, answers:{}, tab:"survey", resultsData:null, submitting:false, resultsLoading:false, resultsAuthed:false };

function g(k, d="") { return state.answers[k] !== undefined ? state.answers[k] : d; }
function sv(k, v) { state.answers[k] = v; }

async function saveToSupabase() {
  const resp = await fetch(SUPABASE_URL + "/rest/v1/responses", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({ answers: state.answers })
  });
  if(!resp.ok) {
    const txt = await resp.text();
    throw new Error(txt || resp.status);
  }
}

async function fetchResponses() {
  const resp = await fetch(SUPABASE_URL + "/rest/v1/responses?select=*&order=submitted_at.asc", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });
  if(!resp.ok) throw new Error("Failed to fetch: " + resp.status);
  return resp.json();
}

function avg(all, key) {
  const vals = all.map(r => r.answers[key]).filter(v => v > 0 && !isNaN(v));
  return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : "—";
}

function stars(key, scale) {
  const cur = g(key, 0);
  return '<div class="stars">' + Array.from({length:scale},(_,j)=>'<div class="star'+(cur===j+1?" sel":"")+('" onclick="setR(\''+key+'\',')+(j+1)+')">'+(j+1)+'</div>').join("") + '</div>';
}
function ratingBlock(prefix, labels, scale) {
  scale = scale || 5;
  return labels.map(function(lbl,i){ return '<div class="rating-row"><span class="rating-label">'+lbl+'</span>'+stars(prefix+"_"+i, scale)+'</div>'; }).join("");
}
function ta(key, ph) {
  ph = ph || "Your response...";
  return '<textarea placeholder="'+ph+'" oninput="sv(\''+key+'\',this.value)">'+g(key)+'</textarea>';
}
function ideaBlock(prefix, ideas) {
  return ideas.map(function(idea,i){
    return '<div class="module-card">'
      +'<div class="module-card-title">'+idea+'</div>'
      +'<div class="rating-row"><span class="rating-label">Attractiveness / potential value</span>'+stars(prefix+"_attr_"+i,5)+'</div>'
      +'<div class="rating-row"><span class="rating-label">Difficulty to build</span>'+stars(prefix+"_diff_"+i,5)+'</div>'
      +'<div class="rating-row"><span class="rating-label">Difficulty for competitor to replicate</span>'+stars(prefix+"_rep_"+i,5)+'</div>'
      +'</div>';
  }).join("");
}

function section0() {
  return '<div class="question"><div class="q-label">Your name</div><div class="name-fields">'
    +'<input type="text" placeholder="First name" value="'+g('first_name')+'" oninput="sv(\'first_name\',this.value)">'
    +'<input type="text" placeholder="Last name" value="'+g('last_name')+'" oninput="sv(\'last_name\',this.value)">'
    +'</div></div>'
    +'<div class="question"><div class="q-label">If Mosaic is wildly successful, who will it impact and what will it do for them?</div>'+ta("mission_impact")+'</div>'
    +'<div class="question"><div class="q-label">What is the Mission of Mosaic?</div>'+ta("mission_statement")+'</div>';
}

function section1() {
  return '<div class="question">'
    +'<div class="q-label">Rate the importance of serving each customer segment (1 = not very important, 5 = very important)</div>'
    +'<div class="q-sub" style="margin-top:1rem;font-weight:500">Next 18 months</div>'
    +ratingBlock("c18",CUSTOMERS)
    +'<div class="q-sub" style="margin-top:1.25rem;font-weight:500">By 2030</div>'
    +ratingBlock("c30",CUSTOMERS)
    +'</div>';
}

function section2() {
  return '<div class="question">'
    +'<div class="q-label">Rate each module\'s target end-state (1 = Table stakes, 2 = Competitive parity, 3 = Market leading, 4 = Category defining)</div>'
    +ratingBlock("mod_es",MODULES,4)
    +'</div>'
    +MODULES.map(function(m,i){
      return '<div class="module-card">'
        +'<div class="module-card-title">'+m+'</div>'
        +'<div class="q-sub">Describe the 2030 end-state</div>'+ta("mod_desc_"+i,"Describe the 2030 end-state...")
        +'<div class="q-sub" style="margin-top:8px">Have competitors reached this? Name them</div>'+ta("mod_comp_"+i,"Competitor names...")
        +'<div class="q-sub" style="margin-top:8px">Confidence in delivery at current pace (1–5)</div>'+stars("mod_conf_"+i,5)
        +'<div class="q-sub" style="margin-top:8px">What would raise your confidence?</div>'+ta("mod_raise_"+i,"What would help...")
        +'</div>';
    }).join("")
    +'<div class="question" style="margin-top:1.5rem">'
    +'<div class="q-label">With current capacity, how many new ideas can we take on in the next 12 months? (1 = one idea, 5 = four or more)</div>'
    +stars("capacity",5)
    +'</div>';
}

function section3() {
  return '<div class="section-title" style="font-size:16px;border:none;padding:0;margin-bottom:1rem">Vertical product ideas</div>'
    +ideaBlock("vert",VERT_IDEAS)
    +'<div class="question"><div class="q-sub">Any other vertical ideas?</div>'+ta("vert_other")+'</div>'
    +'<div class="section-title" style="font-size:16px;border:none;padding:0;margin-top:1.5rem;margin-bottom:1rem">Horizontal product ideas</div>'
    +ideaBlock("horiz",HORIZ_IDEAS)
    +'<div class="question"><div class="q-sub">Any other horizontal ideas?</div>'+ta("horiz_other")+'</div>';
}

function section4() {
  return '<div class="question"><div class="q-label">Who are our largest competitors and why?</div>'+ta("comp_competitors")+'</div>'
    +COMP_ADVS.map(function(adv,i){
      return '<div class="module-card">'
        +'<div class="module-card-title">'+adv+'</div>'
        +'<div class="rating-row"><span class="rating-label">Importance to Mosaic\'s success</span>'+stars("cadv_imp_"+i,5)+'</div>'
        +'<div class="rating-row"><span class="rating-label">Ease of competitor replication</span>'+stars("cadv_ease_"+i,5)+'</div>'
        +'<div class="rating-row"><span class="rating-label">Our current performance</span>'+stars("cadv_perf_"+i,5)+'</div>'
        +'<div class="q-sub" style="margin-top:8px">What would increase our performance?</div>'+ta("cadv_raise_"+i)
        +'</div>';
    }).join("")
    +'<div class="question" style="margin-top:1rem"><div class="q-sub">Any competitive advantages we\'re missing?</div>'+ta("comp_other")+'</div>'
    +'<div class="question"><div class="q-label">If wildly successful, what will be the keys to our 2030 success?</div>'+ta("success_keys")+'</div>'
    +'<div class="question"><div class="q-label">If we fail to achieve our 2030 ambition, what will be the reasons?</div>'+ta("fail_reasons")+'</div>';
}

function renderSurvey() {
  var sectionFns = [section0,section1,section2,section3,section4];
  var prog = Math.round((state.section+1)/SECTIONS.length*100);
  var isLast = state.section === SECTIONS.length-1;
  var submitBtn = isLast
    ? '<button class="btn primary" onclick="submitSurvey()" '+(state.submitting?"disabled":"")+'>'+
      (state.submitting?'<span class="spinner"></span>Submitting...':'Submit survey')+'</button>'
    : '<button class="btn primary" onclick="next()">Next</button>';
  return '<div class="progress-bar"><div class="progress-fill" style="width:'+prog+'%"></div></div>'
    +'<div class="progress-label">Section '+(state.section+1)+' of '+SECTIONS.length+' — '+SECTIONS[state.section]+'</div>'
    +'<div class="section-title">'+SECTIONS[state.section]+'</div>'
    +sectionFns[state.section]()
    +'<div class="nav-row">'
    +'<button class="btn" onclick="prev()" '+(state.section===0?"disabled":"")+'>Back</button>'
    +submitBtn
    +'</div>';
}

function renderDashboard() {
  if(state.resultsLoading) return '<div class="loading"><span class="spinner"></span>Loading responses...</div>';
  var all = state.resultsData || [];
  if(!all.length) return '<div class="no-resp" style="padding:2rem 0;text-align:center">No responses yet.</div>';

  var latest = new Date(all[all.length-1].submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  var names = all.map(function(r,i){
    var fn = r.answers.first_name||"";
    var ln = r.answers.last_name||"";
    return (fn||ln) ? (fn+" "+ln).trim() : "Respondent "+(i+1);
  });

  function openText(key, label) {
    var entries = all.map(function(r,i){ return r.answers[key]?'<div class="resp-item"><strong>'+names[i]+':</strong> '+r.answers[key]+'</div>':""; }).join("");
    return '<div class="dash-card"><h3>'+label+'</h3>'+(entries||"<div class='no-resp'>No responses yet</div>")+'</div>';
  }
  function barChart(title, items, keyFn) {
    return '<div class="dash-card"><h3>'+title+'</h3>'+items.map(function(item,i){
      var a = avg(all, keyFn(i));
      return '<div class="bar-row"><span class="bar-label">'+item+'</span><span class="bar-val">'+a+'</span>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+(a==="—"?0:Math.round(parseFloat(a)/5*100))+'%"></div></div></div>';
    }).join("")+'</div>';
  }
  function moduleOpenText(keyPrefix, label) {
    return '<div class="dash-card"><h3>'+label+'</h3>'
      +MODULES.map(function(m,i){
        return '<div style="margin-bottom:1rem">'
          +'<div style="font-size:13px;font-weight:500;margin-bottom:4px">'+m+'</div>'
          +(all.map(function(r,ri){ return r.answers[keyPrefix+i]?'<div class="resp-item"><strong>'+names[ri]+':</strong> '+r.answers[keyPrefix+i]+'</div>':""; }).join("")||"<div class='no-resp'>No responses</div>")
          +'</div>';
      }).join("")+'</div>';
  }
  function advOpenText(keyPrefix, label) {
    return '<div class="dash-card"><h3>'+label+'</h3>'
      +COMP_ADVS.map(function(adv,i){
        return '<div style="margin-bottom:1rem">'
          +'<div style="font-size:13px;font-weight:500;margin-bottom:4px">'+adv+'</div>'
          +(all.map(function(r,ri){ return r.answers[keyPrefix+i]?'<div class="resp-item"><strong>'+names[ri]+':</strong> '+r.answers[keyPrefix+i]+'</div>':""; }).join("")||"<div class='no-resp'>No responses</div>")
          +'</div>';
      }).join("")+'</div>';
  }

  return '<div class="stat-row">'
    +'<div class="stat"><div class="stat-val">'+all.length+'</div><div class="stat-lbl">Total responses</div></div>'
    +'<div class="stat"><div class="stat-val">'+latest+'</div><div class="stat-lbl">Latest submission</div></div>'
    +'</div>'
    +'<div class="dash-card"><h3>Respondents</h3>'
    +names.map(function(n,i){ return '<div class="resp-item">'+n+' <span style="color:var(--text-secondary);font-size:12px">— '+new Date(all[i].submitted_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})+'</span></div>'; }).join("")
    +'</div>'
    +openText("mission_impact","Mission — impact statements")
    +openText("mission_statement","Mission — mission statements")
    +barChart("Customer importance — next 18 months (avg)", CUSTOMERS, function(i){ return "c18_"+i; })
    +barChart("Customer importance — by 2030 (avg)", CUSTOMERS, function(i){ return "c30_"+i; })
    +barChart("Module end-state target (avg, 1–4 scale)", MODULES, function(i){ return "mod_es_"+i; })
    +barChart("Module delivery confidence (avg)", MODULES, function(i){ return "mod_conf_"+i; })
    +moduleOpenText("mod_desc_","Module 2030 end-state descriptions")
    +moduleOpenText("mod_comp_","Competitors mentioned per module")
    +barChart("Vertical ideas — attractiveness (avg)", VERT_IDEAS, function(i){ return "vert_attr_"+i; })
    +barChart("Vertical ideas — build difficulty (avg)", VERT_IDEAS, function(i){ return "vert_diff_"+i; })
    +barChart("Vertical ideas — competitor replication difficulty (avg)", VERT_IDEAS, function(i){ return "vert_rep_"+i; })
    +barChart("Horizontal ideas — attractiveness (avg)", HORIZ_IDEAS, function(i){ return "horiz_attr_"+i; })
    +barChart("Horizontal ideas — build difficulty (avg)", HORIZ_IDEAS, function(i){ return "horiz_diff_"+i; })
    +barChart("Horizontal ideas — competitor replication difficulty (avg)", HORIZ_IDEAS, function(i){ return "horiz_rep_"+i; })
    +barChart("Competitive advantage — importance (avg)", COMP_ADVS, function(i){ return "cadv_imp_"+i; })
    +barChart("Competitive advantage — ease of replication (avg)", COMP_ADVS, function(i){ return "cadv_ease_"+i; })
    +barChart("Competitive advantage — current performance (avg)", COMP_ADVS, function(i){ return "cadv_perf_"+i; })
    +advOpenText("cadv_raise_","How to improve each competitive advantage")
    +openText("comp_competitors","Largest competitors")
    +openText("success_keys","Keys to 2030 success")
    +openText("fail_reasons","Reasons for potential failure")
    +openText("vert_other","Other vertical ideas")
    +openText("horiz_other","Other horizontal ideas")
    +openText("comp_other","Other competitive advantages")
    +'<div style="margin-top:1.5rem;text-align:center"><button class="btn" onclick="loadResults()">Refresh results</button></div>';
}

function render() {
  var app = document.getElementById("app");

  if(state.view==="gate") {
    app.innerHTML='<div class="gate">'
      +'<div><div class="gate-logo">MOSAIC</div><h1>Strategy Workshop Survey</h1><p style="margin-top:0.5rem">Enter the password to continue</p></div>'
      +'<input type="password" id="pw" placeholder="Password" onkeydown="if(event.key===\'Enter\')checkPw()">'
      +'<div class="err" id="pw-err"></div>'
      +'<button class="btn primary" onclick="checkPw()">Continue</button>'
      +'</div>';
    return;
  }

  if(state.view==="done") {
    app.innerHTML='<div class="submitted">'
      +'<div class="gate-logo" style="margin-bottom:1rem">MOSAIC</div>'
      +'<h2>Thank you</h2><p>Your responses have been recorded.</p>'
      +'</div>';
    return;
  }

  app.innerHTML='<div class="header">'
    +'<div class="header-logo">MOSAIC · Strategy Workshop</div>'
    +'<div class="tabs">'
    +'<button class="tab'+(state.tab==="survey"?" active":"")+'" onclick="switchTab(\'survey\')">Survey</button>'
    +'<button class="tab'+(state.tab==="results"?" active":"")+'" onclick="switchTab(\'results\')">Results</button>'
    +'</div></div>'
    +(state.tab==="survey" ? renderSurvey() : '<div>'+renderDashboard()+'</div>');
}

window.sv = sv;
window.setR = function(k,v){ state.answers[k]=v; render(); };
window.prev = function(){ state.section=Math.max(0,state.section-1); render(); window.scrollTo(0,0); };
window.next = function(){ state.section=Math.min(SECTIONS.length-1,state.section+1); render(); window.scrollTo(0,0); };

window.submitSurvey = async function(){
  state.submitting=true; render();
  try {
    await saveToSupabase();
    state.view="done"; render();
  } catch(e) {
    state.submitting=false;
    alert("There was an error submitting your response. Please check your connection and try again.\n\n"+e.message);
    render();
  }
};

window.loadResults = async function(){
  state.resultsLoading=true; render();
  try {
    state.resultsData = await fetchResponses();
  } catch(e) {
    alert("Could not load results: "+e.message);
  }
  state.resultsLoading=false; render();
};

window.switchTab = function(t){
  if(t==="results" && !state.resultsAuthed) {
    var pw = prompt("Enter the admin password to view results:");
    if(pw===RESULTS_PASS){ state.resultsAuthed=true; state.tab=t; loadResults(); }
    else { alert("Incorrect admin password."); }
    return;
  }
  state.tab=t;
  if(t==="results" && !state.resultsData) loadResults();
  else render();
};

window.checkPw = function(){
  var v = document.getElementById("pw").value;
  if(v===SURVEY_PASS){ state.view="survey"; render(); }
  else if(v===RESULTS_PASS){ state.view="survey"; state.resultsAuthed=true; state.tab="results"; render(); loadResults(); }
  else { document.getElementById("pw-err").textContent="Incorrect password. Please try again."; }
};

render();
</script>


</body></html>
